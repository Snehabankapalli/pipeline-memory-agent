<svg viewBox="0 0 780 460" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="780" height="460" fill="url(#bg2)" rx="12"/>
  <rect width="780" height="460" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Window chrome -->
  <circle cx="24" cy="24" r="6" fill="#f85149"/>
  <circle cx="44" cy="24" r="6" fill="#e3b341"/>
  <circle cx="64" cy="24" r="6" fill="#3fb950"/>
  <text x="390" y="29" fill="#8b949e" font-size="11" text-anchor="middle">pipeline-memory-agent — terminal</text>
  <line x1="0" y1="42" x2="780" y2="42" stroke="#21262d" stroke-width="1"/>

  <!-- Prompt line -->
  <text x="20" y="68" fill="#3fb950" font-size="12">$ python src/agent.py --pipeline fintech_daily_pipeline</text>

  <!-- Run output -->
  <text x="20" y="94" fill="#8b949e" font-size="11">Loading memory: fintech_daily_pipeline (90-day history)</text>

  <text x="20" y="116" fill="#58a6ff" font-size="11">MEMORY BASELINE</text>
  <text x="20" y="132" fill="#8b949e" font-size="11">  p95 duration   : 38m 14s</text>
  <text x="20" y="148" fill="#8b949e" font-size="11">  avg row count  : 4,218,442</text>
  <text x="20" y="164" fill="#8b949e" font-size="11">  last 30 runs   : 28 success / 2 failure</text>
  <text x="20" y="180" fill="#8b949e" font-size="11">  known failures : schema_drift (2025-11-14), null_spike (2025-12-01)</text>

  <line x1="20" y1="192" x2="760" y2="192" stroke="#21262d" stroke-width="1"/>

  <text x="20" y="212" fill="#e3b341" font-size="11">CURRENT RUN ANOMALY DETECTED</text>
  <text x="20" y="228" fill="#8b949e" font-size="11">  duration       : 71m 22s  <tspan fill="#f85149">(+87% above p95 baseline)</tspan></text>
  <text x="20" y="244" fill="#8b949e" font-size="11">  row count      : 4,221,038  <tspan fill="#3fb950">(within normal range)</tspan></text>
  <text x="20" y="260" fill="#8b949e" font-size="11">  error          : SnowflakeOperationalError — warehouse suspended mid-run</text>

  <line x1="20" y1="272" x2="760" y2="272" stroke="#21262d" stroke-width="1"/>

  <text x="20" y="292" fill="#6b48ff" font-size="11">CLAUDE ANALYSIS  (checking healing log for prior occurrences...)</text>
  <text x="20" y="310" fill="#e6edf3" font-size="11">  Root cause: COMPUTE_WH auto-suspended during peak ingest window (02:14 AM).</text>
  <text x="20" y="326" fill="#e6edf3" font-size="11">  Similar event: 2025-11-03 — resolved by setting AUTO_SUSPEND = 300.</text>
  <text x="20" y="342" fill="#e6edf3" font-size="11">  Recommendation: Increase AUTO_SUSPEND to 600s for nightly pipeline window.</text>

  <line x1="20" y1="354" x2="760" y2="354" stroke="#21262d" stroke-width="1"/>

  <text x="20" y="374" fill="#3fb950" font-size="11">AUTO-HEAL  applying fix from healing log...</text>
  <text x="20" y="390" fill="#8b949e" font-size="11">  ALTER WAREHOUSE COMPUTE_WH SET AUTO_SUSPEND = 600;</text>
  <text x="20" y="406" fill="#8b949e" font-size="11">  Triggering Airflow DAG rerun: fintech_daily_pipeline @ 2026-01-15</text>
  <text x="20" y="422" fill="#3fb950" font-size="11">  Memory updated. Healing log appended. Slack alert sent to #data-oncall.</text>

  <!-- Footer -->
  <text x="390" y="448" fill="#30363d" font-size="9" text-anchor="middle">github.com/Snehabankapalli/pipeline-memory-agent</text>
</svg>
